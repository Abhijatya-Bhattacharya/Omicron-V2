name: omicron
description: "Automated Research Assistant"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  google_fonts: ^6.1.0
  http: ^1.1.0
  loading_animation_widget: ^1.2.0+4
  flutter_markdown: ^0.6.18
  file_picker: ^6.1.1
  pdf: ^3.10.7
  url_launcher: ^6.2.5
  path_provider: ^2.1.3
  shared_preferences: ^2.2.3
  fl_chart: ^0.69.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/app_icon.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/app_icon.png"
    background_color: "#18181A"
    theme_color: "#18181A"
  windows:
    generate: true
    image_path: "assets/app_icon.png"
    icon_size: 256
  macos:
    generate: true
    image_path: "assets/app_icon.png"