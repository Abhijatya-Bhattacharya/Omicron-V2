<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <style>text { font-family: Arial, sans-serif; font-size:14px; }</style>
  <!-- Identification -->
  <rect x="50" y="30" width="300" height="70" rx="8" ry="8" fill="#e8f4ff" stroke="#1f77b4"/>
  <text x="70" y="55">Identification</text>
  <text x="70" y="75">Records identified through databases: n = [ ]</text>
  <text x="70" y="95">Additional records: n = [ ]</text>

  <!-- Arrow -->
  <line x1="200" y1="100" x2="200" y2="160" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Screening -->
  <rect x="200" y="160" width="400" height="70" rx="8" ry="8" fill="#fff4e6" stroke="#ff7f0e"/>
  <text x="220" y="185">Screening</text>
  <text x="220" y="205">Records after duplicates removed: n = [ ]</text>
  <text x="220" y="225">Records screened: n = [ ]</text>
  <text x="220" y="245">Records excluded: n = [ ]</text>

  <!-- Arrow to Eligibility -->
  <line x1="400" y1="230" x2="400" y2="300" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Eligibility -->
  <rect x="250" y="300" width="300" height="70" rx="8" ry="8" fill="#e6ffef" stroke="#2ca02c"/>
  <text x="270" y="325">Eligibility</text>
  <text x="270" y="345">Full-text articles assessed for eligibility: n = [ ]</text>
  <text x="270" y="365">Full-text articles excluded, with reasons: n = [ ]</text>

  <!-- Arrow to Included -->
  <line x1="400" y1="370" x2="400" y2="430" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Included -->
  <rect x="300" y="430" width="200" height="50" rx="8" ry="8" fill="#f0e6ff" stroke="#9467bd"/>
  <text x="330" y="460">Included</text>
  <text x="330" y="478">Studies included in qualitative synthesis: n = [ ]</text>
  <text x="330" y="496">Studies included in quantitative synthesis (meta-analysis): n = [ ]</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="0" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#333" />
    </marker>
  </defs>
</svg>